name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build y test se habilitaran cuando haya codigo compilable
      # - run: pnpm build
      # - run: pnpm test
      - name: Verify install
        run: pnpm ls --depth 0 -r
